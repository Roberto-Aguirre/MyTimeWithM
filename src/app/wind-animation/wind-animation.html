<div class="wind-container">
    @for (item of hojas; track $index) {
        <div class="wind-object" [style.top.px]="($index * 40) + 50">
            <img src="/flower.png" alt="objeto al viento">
        </div>
    }
    @for (item of hojas1; track $index) {
        <div class="wind-object-1" [style.top.px]="($index * 40) + 50">
            <img src="/flower.png" class="" alt="objeto al viento">
        </div>
    }
</div>
